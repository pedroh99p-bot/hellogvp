    <script>
    (function() {
      var u = new URLSearchParams(window.location.search);
      var KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','utm_id','fbclid','ttclid','click_id','_fbp','gclid','xcod','sck','cv','salesCode'];
      var captured = {};
      KEYS.forEach(function(k){ var v = u.get(k); if (v) captured[k] = v; });
      try {
        var saved = JSON.parse(sessionStorage.getItem('shark_utms') || '{}');
        Object.keys(captured).forEach(function(k){ saved[k] = captured[k]; });
        sessionStorage.setItem('shark_utms', JSON.stringify(saved));
        captured = saved;
      } catch(e) {}
      function buildLink(originalHref) {
        var url = new URL(originalHref, location.origin);
        Object.keys(captured).forEach(function(k){
          if (!url.searchParams.has(k)) url.searchParams.set(k, captured[k]);
        });
        return url.toString();
      }
      function attach() {
        document.querySelectorAll('a.button, a.cta, a[href*="/l/"], a[href*="/c/"], a[href*="/b/"]').forEach(function(btn){
          btn.addEventListener('click', function() {
            try { btn.href = buildLink(btn.href); } catch(err) {}
          }, { once: false, capture: true });
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', attach);
      } else {
        attach();
      }
    })();
    </script>

    <script>
        let isRedirecting = false;
        const redirectDelayMs = 300;

        function redirectToDestination(destinoURL) {
            window.location.href = destinoURL;
        }

        function triggerMetaLeadEvent(destinoURL, buttonText, onComplete) {
            if (typeof fbq !== 'function') {
                onComplete();
                return;
            }

            fbq('track', 'Lead', {
                content_name: 'Pressel CTA',
                content_category: 'pressel',
                button_text: buttonText,
                destination_url: destinoURL,
                event_callback: onComplete
            });
        }

        function handleRedirect(event) {
            if (isRedirecting) {
                event.preventDefault();
                return;
            }

            event.preventDefault();
            isRedirecting = true;

            const linkElement = event.currentTarget;
            const destinoURL = linkElement.href;
            const buttonText = linkElement.textContent.replace(/\s+/g, ' ').trim();
            let hasRedirected = false;

            function completeRedirect() {
                if (hasRedirected) {
                    return;
                }

                hasRedirected = true;
                redirectToDestination(destinoURL);
            }

            if (typeof ttq !== 'undefined') {
                ttq.track('ClickButton', {
                    content_name: 'Entrar_Telegram',
                    content_category: 'Precel_Redirect'
                });
            }

            try {
                triggerMetaLeadEvent(destinoURL, buttonText, completeRedirect);
            } catch (error) {
                completeRedirect();
                return;
            }

            setTimeout(completeRedirect, redirectDelayMs);
        }
    </script>
